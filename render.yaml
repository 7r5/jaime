services:
  - type: web
    name: whatsapp-assistant-backend
    env: python
    plan: free
    repo: auto
    buildCommand: "cd backend && poetry install"
    startCommand: "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: OPENAI_API_KEY
      - key: CLAUDE_API_KEY
      - key: AI_PROVIDER
      - key: WHATSAPP_TOKEN
      - key: WHATSAPP_VERIFY_TOKEN
      - key: ADMIN_USER
      - key: ADMIN_PASSWORD
      - key: SECRET_KEY
      - key: DATABASE_URL
